<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>main page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="w-full bg-base-100 shadow-sm sticky top-0 z-50">
      <div class="navbar container mx-auto px-2 md:px-4">
        <div class="flex-1">
          <div class="flex items-center gap-2 md:gap-3 select-none">
            <img class="w-10 md:w-12" src="./assets/github-logo.png" alt="Logo" />
            <p class="text-xl md:text-2xl font-bold tracking-tight text-base-content truncate">
              GitHub <span class="hidden sm:inline"> issues Tracker</span>
            </p>
          </div>
        </div>

        <div class="flex items-center gap-2 md:gap-3">
          <div class="form-control">
            <label class="input input-bordered flex items-center gap-2 h-10 px-2 md:px-4">
              <i class="fa-solid fa-magnifying-glass text-[14px] text-gray-500"></i>
              <input
                type="text"
                class="grow focus:outline-none text-sm w-20 sm:w-24 md:w-auto"
                placeholder="Search..."
              />
            </label>
          </div>

          <button class="btn btn-primary shadow-md">
            <i class="fa-solid fa-plus text-xs"></i>
            <span>New Issue</span>
          </button>
        </div>
      </div>
    </header>

    <main class="min-h-screen bg-base-200 py-8">
      <div class="w-11/12 max-w-7xl mx-auto space-y-6">
        
        <section class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
          <div class="flex flex-wrap gap-3">
            <button id="all-btn" class="btn bg-[#5800FF] hover:bg-[#4800D6] text-white border-none px-10">
              All
            </button>
            <button id="open-btn" class="btn btn-outline border-gray-200 text-gray-500 hover:bg-gray-50 px-10">
              Open
            </button>
            <button id="closed-btn" class="btn btn-outline border-gray-200 text-gray-500 hover:bg-gray-50 px-10">
              Closed
            </button>
          </div>
        </section>

        <section class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center">
                <img src="./assets/Aperture.png" alt="aperture">
              </div>

              <div>
                <h2 id="issue-count" class="text-xl font-bold text-slate-800">0 Issues</h2>
                <p class="text-sm text-gray-400">Track and manage your project issues</p>
              </div>
            </div>

            <div class="flex items-center gap-6">
              <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                <span class="text-sm font-medium text-slate-600">Open</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-[#A855F7]"></span>
                <span class="text-sm font-medium text-slate-600">Closed</span>
              </div>
            </div>
            
          </div>
        </section>

        <section id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <div id="loader" class="col-span-full flex justify-center py-10">
            <span class="loading loading-spinner loading-lg text-[#5800FF]"></span>
          </div>
        </section>

      </div>
    </main>

    <script src="./script/mainPage.js"></script>
    
  </body>
</html>
