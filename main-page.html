<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        body { font-family: "Geist", sans-serif; }
     
        .modal-box { padding: 0 !important; overflow: hidden; max-width: 42rem; }
    </style>
</head>
<body class="bg-base-200">
    <header class="w-full bg-white shadow-sm sticky top-0 z-50">
        <div class="navbar container mx-auto px-4">
            <div class="flex-1">
                <div class="flex items-center gap-3 select-none">
                    <img class="w-10" src="./assets/github-logo.png" alt="Logo" />
                    <p class="text-xl font-bold tracking-tight text-slate-800">
                        GitHub <span class="hidden sm:inline"> Issues Tracker</span>
                    </p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button class="btn btn-primary bg-[#5800FF] border-none shadow-md text-white">
                    <i class="fa-solid fa-plus text-xs"></i> <span>New Issue</span>
                </button>
            </div>
        </div>
    </header>

    <main class="py-8">
        <div class="w-11/12 max-w-7xl mx-auto space-y-6">
            <section class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                <div class="flex flex-wrap gap-3">
                    <button class="btn bg-[#5800FF] hover:bg-[#4800D6] text-white border-none px-10">All</button>
                    <button class="btn btn-outline border-gray-200 text-gray-500 hover:bg-gray-50 px-10">Open</button>
                    <button class="btn btn-outline border-gray-200 text-gray-500 hover:bg-gray-50 px-10">Closed</button>
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center">
                            <img src="./assets/Aperture.png" alt="aperture" class="w-6">
                        </div>
                        <div>
                            <h2 id="issue-count" class="text-xl font-bold text-slate-800">0 Issues</h2>
                            <p class="text-sm text-gray-400">Track and manage your project issues</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div id="loader" class="col-span-full flex justify-center py-10">
                    <span class="loading loading-spinner loading-lg text-[#5800FF]"></span>
                </div>
            </section>
        </div>
    </main>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box bg-white border-none rounded-2xl">
            <div id="modal-content">
                </div>
        </div>
        <form method="dialog" class="modal-backdrop bg-slate-900/40 backdrop-blur-sm">
            <button>close</button>
        </form>
    </dialog>

    <script src="./script/mainPage.js"></script>
</body>
</html>
