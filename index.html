<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and fev icon -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <!-- font integration -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --font-geist: "Geist", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Geist", sans-serif;
      }
    </style>

    <link rel="stylesheet" href="./style/style.css" />
  </head>

  <body>
    <header class="w-full bg-base-100 shadow-sm sticky top-0 z-50">
  <div class="navbar container mx-auto px-2 md:px-4">
    <div class="flex-1">
      <div class="flex items-center gap-2 md:gap-3 select-none">
        <img class="w-10 md:w-12" src="./assets/github-logo.png" alt="Logo" />
        <p class="text-xl md:text-2xl font-bold tracking-tight text-base-content truncate">
          GitHub <span class="hidden sm:inline">Tracker</span>
        </p>
      </div>
    </div>

    <div class="flex items-center gap-2 md:gap-3">
      <div class="form-control">
        <label class="input input-bordered flex items-center gap-2 h-10 px-2 md:px-4">
          <i class="fa-solid fa-magnifying-glass text-[14px] text-gray-500"></i>
          <input
            type="text"
            class="grow focus:outline-none text-sm w-20 sm:w-24 md:w-auto"
            placeholder="Search..."
          />
        </label>
      </div>

      <button class="btn btn-primary shadow-md">
        <i class="fa-solid fa-plus text-xs"></i>
        <span>New Issue</span>
      </button>
    </div>
  </div>
</header>
    
    
    
    
    
    
    
    
    
    

    
    
    
    
    
    

    
    
    
    
    
    
    

    
    
    
    
    
    
    
  </body>
</html>
