<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign In page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      * {
        font-family: var(--font-geist);
      }
    </style>
  </head>

  <body class="min-h-screen bg-base-200 mx-auto">
    <div class="max-w-md w-full mx-auto mt-3">
      <div class="logo mx-auto text-center p-15 bg-base-100 rounded-t-2xl">
        <img class="w-[100px] h-[100px] mx-auto" src="./assets/github-logo.png" alt="logo" />
        <p class="text-2xl font-semibold text-[#1F2937] mt-4">GitHub Issues Tracker</p>
        <p class="text-sm font-normal text-[#64748B]">Sign in to manage your issues</p>
      </div>

      <div class="form">
        <div class="card bg-base-100 w-full mx-auto shadow-xl rounded-t-none">
          <div class="card-body">
            <fieldset class="fieldset">
              <label class="label text-[16px] font-medium text-[#1F2937]">Username</label>
              <input
                id="input-username"
                type="text"
                class="input w-full bg-base-200"
                value="admin"
                placeholder="Enter Username"
              />

              <label class="label text-[16px] font-medium text-[#1F2937] mt-2">Password</label>
              <input
                id="input-password"
                type="password"
                class="input w-full bg-base-200"
                value="admin123"
                placeholder="Enter Password"
              />

              <button id="signIn-btn" class="btn btn-primary mt-6 w-full text-white">
                Sign In
              </button>
            </fieldset>
          </div>
        </div>

        <div class="card bg-base-100 w-full mx-auto shadow-xl rounded-t-none p-4">
          <div class="flex items-center gap-3 my-2">
            <div class="flex-1 h-[1px] bg-gray-300"></div>
            <p class="text-sm text-gray-500">OR</p>
            <div class="flex-1 h-[1px] bg-gray-300"></div>
          </div>

          <div class="flex flex-col items-center mt-2">
            <p>Demo Credentials:</p>
            <p>Username: admin</p>
            <p>Password: admin123</p>
          </div>
        </div>
      </div>
    </div>

    <script src="./script/signIn.js"></script>
  </body>
</html>
